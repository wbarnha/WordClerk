name: "Bluebook citation correction"
description: "Report a wrong, missing, or incorrectly-flagged Bluebook citation rule. No coding experience needed -- just fill in the form below."
title: "[Bluebook correction] "
labels: ["bluebook", "correction"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenClerk's Bluebook citation checker! You don't need to
        know how to code to fill this out -- just answer the questions below as best you can.
        A maintainer will review your report and make the fix.

  - type: dropdown
    id: problem-type
    attributes:
      label: What kind of problem is this?
      options:
        - "The checker flagged something correct as wrong (false positive)"
        - "The checker missed something that should have been flagged (false negative)"
        - "The suggested correction/abbreviation itself is wrong"
        - "A reporter abbreviation is marked 'unrecognized' but it's actually valid"
        - "Something else"
    validations:
      required: true

  - type: textarea
    id: citation-example
    attributes:
      label: Citation example
      description: >
        Paste the exact citation text you were checking (or the part of it that's relevant),
        e.g. "955 So. 2d 425" or "Smith v. Acme Corporation, 123 F.3d 456 (9th Cir. 2010)".
      placeholder: "955 So. 2d 425"
    validations:
      required: true

  - type: textarea
    id: whats-wrong
    attributes:
      label: What did OpenClerk say, and what should it have said instead?
      description: Describe the problem in plain language. Include the exact wording OpenClerk showed, if you can.
      placeholder: |
        OpenClerk flagged "..." as wrong and suggested "...", but the correct form is actually "...".
    validations:
      required: true

  - type: textarea
    id: source
    attributes:
      label: What's your source for this correction?
      description: >
        A link or citation to something that backs this up -- e.g. a page of the actual Bluebook,
        a law library citation guide, a court's local rules, or a link to the reporters-db project
        this checker's data comes from (https://github.com/freelawproject/reporters-db). This
        matters for a legal tool: we'd rather cite our sources than guess.
      placeholder: "https://... or a citation like 'Bluebook Rule 10.3.1' or 'Table T1, p. 233'"
    validations:
      required: true

  - type: input
    id: edition
    attributes:
      label: Bluebook edition (if relevant)
      description: Only fill this in if the correction applies to one specific edition (20th, 21st, or 22nd) and not the others.
      placeholder: "e.g. 21st edition only"
    validations:
      required: false

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else we should know?
    validations:
      required: false
