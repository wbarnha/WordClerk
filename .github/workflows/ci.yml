name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]

# Least-privilege default for GITHUB_TOKEN across all jobs. The build/test/lint/typecheck/
# installer/offline jobs only need to read the repo; the deploy-pages and publish jobs override
# this with the wider scopes they actually need (pages/id-token, contents:write/attestations).
permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Verify docs page was generated
        run: |
          set -e
          test -s dist/index.html
          grep -q 'id="security--it-review"' dist/index.html
          grep -q 'id="development"' dist/index.html

      - name: Package add-in
        run: npm run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclerk-addin
          path: openclerk-addin.zip

      - name: Upload dist artifact for GitHub Pages
        uses: actions/upload-artifact@v4
        with:
          name: openclerk-dist
          path: dist/

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    name: Typecheck
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  installer-smoke:
    name: Installer Smoke
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package add-in
        run: npm run package

      - name: Verify package contents include installer assets
        run: |
          set -e
          unzip -l openclerk-addin.zip | tee package-list.txt
          grep -q "installer/install-openclerk.ps1" package-list.txt
          grep -q "installer/install-openclerk.cmd" package-list.txt
          grep -q "installer/install-openclerk.sh" package-list.txt
          grep -q "manifest.xml" package-list.txt
          # Verify the JS installer is no longer bundled (end users do not need Node.js)
          if grep -q "installer/install-openclerk.js" package-list.txt; then
            echo "ERROR: install-openclerk.js must not be in the release package"
            exit 1
          fi

      - name: Verify production manifest URLs
        run: |
          set -e
          unzip -p openclerk-addin.zip manifest.xml > /tmp/release-manifest.xml
          if grep -q "localhost" /tmp/release-manifest.xml; then
            echo "ERROR: release manifest still contains localhost URLs"
            cat /tmp/release-manifest.xml
            exit 1
          fi
          echo "Release manifest URLs look correct:"
          grep -oE 'https://[a-zA-Z0-9./_-]+' /tmp/release-manifest.xml | sort -u

      - name: Installer PowerShell dry-run smoke test
        run: |
          set -e
          unzip -q openclerk-addin.zip -d /tmp/openclerk-release
          pwsh -NonInteractive -File /tmp/openclerk-release/installer/install-openclerk.ps1 -DryRun

      - name: Installer PowerShell copy smoke test
        run: |
          set -e
          pwsh -NonInteractive -File /tmp/openclerk-release/installer/install-openclerk.ps1 \
            -ManifestPath manifest.xml \
            -Target /tmp/openclerk-wef
          test -f /tmp/openclerk-wef/openclerk-manifest.xml

  installer-smoke-macos:
    name: Installer Smoke (macOS)
    needs: build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package add-in
        run: npm run package

      - name: Verify package contents include the macOS installer
        run: |
          set -e
          unzip -l openclerk-addin.zip | tee package-list.txt
          grep -q "installer/install-openclerk.sh" package-list.txt
          grep -q "manifest.xml" package-list.txt

      - name: Unzip release package
        run: unzip -q openclerk-addin.zip -d /tmp/openclerk-release-macos

      - name: Verify installer script is executable after unzip
        run: |
          set -e
          test -x /tmp/openclerk-release-macos/installer/install-openclerk.sh

      - name: Installer bash dry-run smoke test (default target)
        run: |
          set -e
          # No --target passed: exercises the real macOS default-path resolution
          # (~/Library/Containers/com.Microsoft.OsfWebHost/Data/documents/wef).
          output=$(/tmp/openclerk-release-macos/installer/install-openclerk.sh --dry-run)
          echo "$output"
          echo "$output" | grep -q "Library/Containers/com.Microsoft.OsfWebHost/Data/documents/wef"
          echo "$output" | grep -q "Dry run enabled"

      - name: Installer bash copy smoke test
        run: |
          set -e
          /tmp/openclerk-release-macos/installer/install-openclerk.sh \
            --manifest manifest.xml \
            --target /tmp/openclerk-wef-macos
          test -f /tmp/openclerk-wef-macos/openclerk-manifest.xml

      - name: Manual sideload location smoke test (simulates Word for Mac's scan folder)
        run: |
          set -e
          # Word for Mac scans this exact folder for sideloaded manifests; confirm the
          # installer's default target really is that folder end-to-end, with no --target override.
          /tmp/openclerk-release-macos/installer/install-openclerk.sh --manifest manifest.xml
          wef_dir="$HOME/Library/Containers/com.Microsoft.OsfWebHost/Data/documents/wef"
          test -f "$wef_dir/openclerk-manifest.xml"
          grep -q "<OfficeApp" "$wef_dir/openclerk-manifest.xml"

  offline-smoke:
    name: Offline Package Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package offline add-in
        run: npm run package:offline

      - name: Verify offline package contents
        run: |
          set -e
          unzip -l openclerk-addin-offline.zip | tee offline-package-list.txt
          grep -q "installer/setup-local-server.ps1" offline-package-list.txt
          grep -q "installer/serve-openclerk.ps1" offline-package-list.txt
          grep -q "app/taskpane.html" offline-package-list.txt
          grep -q "app/commands.html" offline-package-list.txt
          grep -q "app/vendor/office.js" offline-package-list.txt
          grep -q "app/vendor/fabric.min.css" offline-package-list.txt
          grep -q " manifest.xml" offline-package-list.txt

      - name: Verify no CDN references remain (must work with no internet)
        run: |
          set -e
          unzip -p openclerk-addin-offline.zip app/taskpane.html app/commands.html > /tmp/offline-html.txt
          if grep -qE "appsforoffice\.microsoft\.com|res-1\.cdn\.office\.net" /tmp/offline-html.txt; then
            echo "ERROR: offline package HTML still references Microsoft's CDN"
            exit 1
          fi

      - name: Verify manifest placeholders
        run: |
          set -e
          unzip -p openclerk-addin-offline.zip manifest.xml > /tmp/offline-manifest.xml
          grep -q "localhost:{{PORT}}" /tmp/offline-manifest.xml
          grep -q "k={{SECRET}}" /tmp/offline-manifest.xml
          if grep -q "wbarnha.github.io" /tmp/offline-manifest.xml; then
            echo "ERROR: offline manifest should not reference GitHub Pages"
            exit 1
          fi

      - name: Setup script dry-run smoke test
        run: |
          set -e
          unzip -q openclerk-addin-offline.zip -d /tmp/openclerk-offline
          pwsh -NonInteractive -File /tmp/openclerk-offline/installer/setup-local-server.ps1 -DryRun

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: openclerk-dist
          path: dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish:
    name: Publish Add-in
    needs: [build, test, lint, typecheck, installer-smoke, installer-smoke-macos, offline-smoke]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # office-addin-manifest's dependency chain now pulls in an ESM-only package, which Node 18
          # (used by the other jobs) can't require() -- Node 22.12+ supports require(esm) by default.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive manifest version from release tag
        run: |
          set -e
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: release tag '$tag' is not in the expected vX.Y.Z (or X.Y.Z) format -- can't derive a manifest version from it."
            exit 1
          fi
          major="${version%%.*}"
          if [ "$major" -lt 1 ]; then
            echo "ERROR: release tag '$tag' has major version $major, but the Office manifest schema requires <Version> >= 1.0 (office-addin-manifest validate rejects anything lower). Coupling can't produce a valid manifest version until this project's own tags reach v1.0.0+ -- see manifest.xml and SUBMISSION.md § 1."
            exit 1
          fi
          echo "OPENCLERK_MANIFEST_VERSION=${version}.0" >> "$GITHUB_ENV"
          echo "Manifest version for this release: ${version}.0"

      - name: Build add-in package
        run: npm run build --if-present

      - name: Validate manifest
        run: |
          set -e
          echo "Validating manifest XML and add-in manifest rules..."
          sudo apt-get update -y
          sudo apt-get install -y libxml2-utils
          xmllint --noout manifest.xml
          echo "Running office-addin-manifest validation (using the version locked in package-lock.json)"
          npx --no-install office-addin-manifest validate manifest.xml

      - name: Package add-in
        run: npm run package

      - name: Verify packaged manifest version matches the release tag
        run: |
          set -e
          unzip -p openclerk-addin.zip manifest.xml > /tmp/release-manifest.xml
          actual=$(grep -oE '<Version>[^<]*</Version>' /tmp/release-manifest.xml | sed -E 's/<\/?Version>//g')
          if [ "$actual" != "$OPENCLERK_MANIFEST_VERSION" ]; then
            echo "ERROR: packaged manifest Version is '$actual', expected '$OPENCLERK_MANIFEST_VERSION' (derived from release tag ${{ github.event.release.tag_name }})"
            exit 1
          fi
          echo "Packaged manifest Version correctly matches the release tag: $actual"

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./openclerk-addin.zip
          asset_name: openclerk-addin.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package offline add-in
        run: npm run package:offline

      - name: Verify offline packaged manifest version matches the release tag
        run: |
          set -e
          unzip -p openclerk-addin-offline.zip manifest.xml > /tmp/release-manifest-offline.xml
          actual=$(grep -oE '<Version>[^<]*</Version>' /tmp/release-manifest-offline.xml | sed -E 's/<\/?Version>//g')
          if [ "$actual" != "$OPENCLERK_MANIFEST_VERSION" ]; then
            echo "ERROR: offline packaged manifest Version is '$actual', expected '$OPENCLERK_MANIFEST_VERSION' (derived from release tag ${{ github.event.release.tag_name }})"
            exit 1
          fi
          echo "Offline packaged manifest Version correctly matches the release tag: $actual"

      - name: Upload offline release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./openclerk-addin-offline.zip
          asset_name: openclerk-addin-offline.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.zip'

      - name: Generate checksums
        run: |
          set -e
          sha256sum *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Upload checksums release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./SHA256SUMS
          asset_name: SHA256SUMS
          asset_content_type: text/plain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Partner Center (optional)
        run: |
          set -e
          if [ -z "${{ secrets.PARTNER_CENTER_API_URL }}" ] || [ -z "${{ secrets.PARTNER_CENTER_CLIENT_ID }}" ] || [ -z "${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}" ] || [ -z "${{ secrets.PARTNER_CENTER_TENANT_ID }}" ]; then
            echo "Skipping Partner Center publish because required secrets are not configured."
            exit 0
          fi

          echo "Publishing to Partner Center..."
          sudo apt-get update -y
          sudo apt-get install -y jq

          # Acquire an access token from Azure AD (Client Credentials flow).
          token_response=$(curl -s -X POST \
            -d "grant_type=client_credentials&client_id=${{ secrets.PARTNER_CENTER_CLIENT_ID }}&client_secret=${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}&resource=https://api.partnercenter.microsoft.com" \
            "https://login.microsoftonline.com/${{ secrets.PARTNER_CENTER_TENANT_ID }}/oauth2/token")

          access_token=$(echo "$token_response" | jq -r .access_token)
          if [ -z "$access_token" ] || [ "$access_token" = "null" ]; then
            echo "Failed to obtain access token from Azure AD"
            echo "$token_response"
            exit 1
          fi
          # access_token is derived at runtime (not a literal secrets.* reference), so it isn't on
          # GitHub Actions' auto-mask list -- mask it explicitly so it can never leak into logs.
          echo "::add-mask::$access_token"

          echo "Uploading package to Partner Center API URL"
          curl -sS -X POST \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/zip" \
            --data-binary @./openclerk-addin.zip \
            "${{ secrets.PARTNER_CENTER_API_URL }}" -o partner_response.json || true

          echo "Partner Center response:"
          cat partner_response.json
