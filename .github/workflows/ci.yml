name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [published]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Package add-in
        run: npm run package

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wordclerk-addin
          path: wordclerk-addin.zip

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  installer-smoke:
    name: Installer Smoke
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package add-in
        run: npm run package

      - name: Verify package contents include installer assets
        run: |
          set -e
          unzip -l wordclerk-addin.zip | tee package-list.txt
          grep -q "installer/install-wordclerk.js" package-list.txt
          grep -q "installer/install-wordclerk.ps1" package-list.txt
          grep -q "manifest.xml" package-list.txt

      - name: Installer dry-run smoke test
        run: npm run install:addin:dry-run

      - name: Installer copy smoke test
        run: |
          set -e
          node scripts/install-wordclerk.js --manifest manifest.xml --target .installer-test/wef
          test -f .installer-test/wef/wordclerk-manifest.xml

  publish:
    name: Publish Add-in
    needs: [build, test, installer-smoke]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # office-addin-manifest's dependency chain now pulls in an ESM-only package, which Node 18
          # (used by the other jobs) can't require() -- Node 22.12+ supports require(esm) by default.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build add-in package
        run: npm run build --if-present

      - name: Validate manifest
        run: |
          set -e
          echo "Validating manifest XML and add-in manifest rules..."
          sudo apt-get update -y
          sudo apt-get install -y libxml2-utils
          xmllint --noout manifest.xml
          echo "Running office-addin-manifest validation (using the version locked in package-lock.json)"
          npx --no-install office-addin-manifest validate manifest.xml

      - name: Package add-in
        run: npm run package

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./wordclerk-addin.zip
          asset_name: wordclerk-addin.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Partner Center (optional)
        run: |
          set -e
          if [ -z "${{ secrets.PARTNER_CENTER_API_URL }}" ] || [ -z "${{ secrets.PARTNER_CENTER_CLIENT_ID }}" ] || [ -z "${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}" ] || [ -z "${{ secrets.PARTNER_CENTER_TENANT_ID }}" ]; then
            echo "Skipping Partner Center publish because required secrets are not configured."
            exit 0
          fi

          echo "Publishing to Partner Center..."
          sudo apt-get update -y
          sudo apt-get install -y jq

          # Acquire an access token from Azure AD (Client Credentials flow).
          token_response=$(curl -s -X POST \
            -d "grant_type=client_credentials&client_id=${{ secrets.PARTNER_CENTER_CLIENT_ID }}&client_secret=${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}&resource=https://api.partnercenter.microsoft.com" \
            "https://login.microsoftonline.com/${{ secrets.PARTNER_CENTER_TENANT_ID }}/oauth2/token")

          access_token=$(echo "$token_response" | jq -r .access_token)
          if [ -z "$access_token" ] || [ "$access_token" = "null" ]; then
            echo "Failed to obtain access token from Azure AD"
            echo "$token_response"
            exit 1
          fi

          echo "Uploading package to Partner Center API URL"
          curl -v -X POST \
            -H "Authorization: Bearer $access_token" \
            -H "Content-Type: application/zip" \
            --data-binary @./wordclerk-addin.zip \
            "${{ secrets.PARTNER_CENTER_API_URL }}" -o partner_response.json || true

          echo "Partner Center response:"
          cat partner_response.json
